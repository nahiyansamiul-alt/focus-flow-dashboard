name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $expectedTag = "v$packageVersion"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag $env:GITHUB_REF_NAME does not match package version $packageVersion"
          }

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run release:check

      - name: Clear previous Electron output
        run: npm run clean:electron

      - name: Build and upload draft release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Publish completed release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$env:GITHUB_REF_NAME" --draft=false --latest
